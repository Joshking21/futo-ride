<body class="bg-background text-on-background antialiased min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-[64px] bg-surface border-b border-outline-variant">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Book a Ride</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[80px] pb-[100px] px-margin-mobile md:max-w-[600px] md:mx-auto w-full flex flex-col gap-lg">
<!-- Map Preview Card -->
<section class="w-full h-[240px] rounded-xl overflow-hidden shadow-lg border border-outline-variant relative bg-surface-container-lowest">
<div class="bg-cover bg-center w-full h-full" data-alt="A clean, light-mode stylized digital map of a university campus from a top-down view. The map features soft pastel blue and green tones, clean white roads, and a clear, modern aesthetic. A vibrant blue route line connects two points, indicating a travel path. Professional and minimalist." data-location="FUTO Campus" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAKoIOqnVV-bhWQRUAY-pJWWu6s-dwlpQHCeRXV4oJ9TZSKn4No0I8yBJnmHmpzAQX33ibrOGFC5lf3nkI8VE3pFv9foWRIqRBfeNeoij4zOa06jethvEsHS_lth0RQC3mWzOgDEEkekY5y5jdZe3_14APN-J_9P7XNtR3uS62NTIgBLSVl1JfvLA3RftdB-De6mSn_enEPIRYynSPSa9g-Kjp5yiCE7js_bX-aAGg2BM8SgcEKn1al1vG0FDA5r8lp5LBOgcj7vJT6')"></div>
<!-- Route Overlay Elements -->
<div class="absolute inset-0 pointer-events-none">
<!-- Example route SVG, normally this would be drawn dynamically over the map -->
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="opacity-80" d="M 20 80 Q 40 50, 60 40 T 80 20" fill="transparent" stroke="#1d35d1" stroke-dasharray="4" stroke-width="2"></path>
<circle cx="20" cy="80" fill="#1d35d1" r="3"></circle>
<circle cx="80" cy="20" fill="#001caa" r="4" stroke="white" stroke-width="1.5"></circle>
</svg>
</div>
</section>
<!-- Booking Input Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant p-md flex flex-col gap-md relative">
<!-- Timeline connector line -->
<div class="absolute left-[31px] top-[48px] bottom-[48px] w-[1px] border-l border-dashed border-outline-variant"></div>
<!-- From Input -->
<div class="flex items-start gap-md relative z-10">
<div class="mt-2 flex-shrink-0">
<div class="w-4 h-4 rounded-full bg-primary-fixed-dim border-2 border-primary flex items-center justify-center">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
</div>
</div>
<div class="flex-grow">
<label class="text-label-sm font-label-sm text-secondary block mb-xs">From</label>
<button class="w-full flex items-center justify-between text-left py-sm group">
<div>
<span class="text-body-md font-body-md font-semibold text-on-surface block">SOES Building</span>
<span class="text-body-sm font-body-sm text-secondary truncate block max-w-[200px]">Federal University of Technology, Owerri</span>
</div>
<span class="material-symbols-outlined text-secondary group-hover:text-primary transition-colors">keyboard_arrow_down</span>
</button>
</div>
</div>
<!-- Swap Button -->
<div class="relative h-4 w-full flex items-center justify-center z-20 -my-2">
<div class="absolute w-full border-t border-outline-variant/30"></div>
<button aria-label="Swap locations" class="w-8 h-8 rounded-full bg-surface border border-outline-variant flex items-center justify-center text-secondary shadow-sm hover:bg-surface-container-low transition-colors relative z-10">
<span class="material-symbols-outlined text-[18px]">swap_vert</span>
</button>
</div>
<!-- To Input -->
<div class="flex items-start gap-md relative z-10">
<div class="mt-2 flex-shrink-0">
<div class="w-4 h-4 rounded-full bg-surface-variant border-2 border-primary flex items-center justify-center">
</div>
</div>
<div class="flex-grow">
<label class="text-label-sm font-label-sm text-secondary block mb-xs">To</label>
<div class="relative w-full">
<input class="w-full bg-transparent border-none p-0 text-body-md font-body-md font-semibold text-on-surface placeholder:text-outline-variant focus:ring-0 focus:outline-none py-sm" placeholder="Where to?" type="text"/>
</div>
</div>
</div>
</section>
<!-- Vehicle Type Selection -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant flex overflow-hidden shadow-sm h-14">
<button class="flex-1 bg-primary text-on-primary flex items-center justify-center gap-sm font-label-md text-label-md transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">airport_shuttle</span>
                Keke
            </button>
<button class="flex-1 bg-transparent text-secondary hover:bg-surface-container-low flex items-center justify-center gap-sm font-label-md text-label-md transition-colors border-l border-outline-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">directions_bus</span>
                Bus
            </button>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 w-full px-margin-mobile py-lg bg-gradient-to-t from-surface-container-lowest via-surface-container-lowest to-transparent z-40 md:max-w-[600px] md:left-1/2 md:-translate-x-1/2">
<button class="w-full h-14 bg-on-surface text-surface-container-lowest rounded-xl font-label-md text-label-md flex items-center justify-center shadow-lg hover:bg-inverse-surface transition-colors active:scale-[0.98]">
            Find ride
        </button>
</div>
</body></html>

<script>
        // Simple micro-interaction to cycle through the driver trip states
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('tripActionButton');
            const states = ["Arrived", "Start Trip", "At Dropoff", "Complete Trip"];
            let currentStateIndex = 0;

            btn.addEventListener('click', () => {
                currentStateIndex = (currentStateIndex + 1) % states.length;
                
                // Visual feedback on click
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    btn.style.transform = 'scale(1)';
                    btn.innerText = states[currentStateIndex];
                    
                    // Modify color slightly based on state to indicate progression
                    if (states[currentStateIndex] === "Start Trip") {
                        btn.className = "w-full h-[56px] bg-on-surface text-surface rounded-xl flex items-center justify-center text-body-md font-bold transition-all shadow-lg active:scale-95 duration-150";
                    } else if (states[currentStateIndex] === "At Dropoff") {
                        btn.className = "w-full h-[56px] bg-primary text-on-primary rounded-xl flex items-center justify-center text-body-md font-bold transition-all shadow-lg active:scale-95 duration-150";
                    } else if (states[currentStateIndex] === "Complete Trip") {
                        btn.className = "w-full h-[56px] bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center text-body-md font-bold transition-all shadow-lg active:scale-95 duration-150";
                    } else {
                        btn.className = "w-full h-[56px] bg-primary text-on-primary rounded-xl flex items-center justify-center text-body-md font-bold hover:bg-primary-container hover:text-on-primary-container transition-all shadow-lg active:scale-95 duration-150";
                    }
                }, 150);
            });
        });
    </script>

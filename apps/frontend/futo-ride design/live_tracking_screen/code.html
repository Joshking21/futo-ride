        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 28, 170, 0.7); }

        }
        .pin-pulse {
            animation: pulse-ring 2s infinite;
        }
        
        @keyframes slide-progress {
            0% { width: 33%; }
            100% { width: 66%; }
        }
        .animate-progress {
            animation: slide-progress 2s ease-out forwards;

<body class="bg-surface text-on-surface font-body-md h-screen w-full overflow-hidden flex flex-col relative selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant flat no shadows fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-[48px]">
<button aria-label="Go Back" class="text-primary hover:bg-surface-container-high transition-colors flex items-center justify-center w-[48px] h-[48px] rounded-full opacity-80 transition-all duration-100">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Futo Ride</h1>
<button aria-label="Wallet" class="text-primary hover:bg-surface-container-high transition-colors flex items-center justify-center w-[48px] h-[48px] rounded-full">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</button>
</header>
<!-- Main Content Area: Map Context -->
<main class="flex-1 w-full relative mt-[48px] h-[calc(100vh-48px)]">
<!-- Interactive Map Layer (Simulated) -->

<!-- Map Overlay UI Elements -->
<!-- Moving Keke Pin -->
<div class="absolute top-[40%] left-[50%] transform -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center">
<div class="bg-primary rounded-full p-2 text-on-primary shadow-lg pin-pulse border-2 border-surface">
<span class="material-symbols-outlined text-[20px]" data-icon="local_taxi">local_taxi</span>
</div>
<div class="bg-surface-container-lowest text-on-surface text-label-md font-label-md px-2 py-1 rounded shadow mt-1 whitespace-nowrap">
                    ETA 2 min
                </div>
</div>
<!-- User Location Pin (Static) -->
<div class="absolute top-[60%] left-[45%] transform -translate-x-1/2 -translate-y-1/2 z-10">
<div class="w-4 h-4 bg-secondary rounded-full border-2 border-surface shadow-md"></div>
</div>
<!-- Route Line (Simulated via SVG overlay) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-10" preserveaspectratio="none">
<path d="M 50% 40% C 45% 50%, 48% 55%, 45% 60%" fill="none" stroke="#001caa" stroke-dasharray="8 4" stroke-linecap="round" stroke-width="4"></path>
</svg>
</div>
<!-- Floating SOS Button -->
<div class="absolute right-margin-mobile bottom-[calc(300px+24px)] z-40">
<button class="bg-error text-on-error w-14 h-14 rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.15)] flex items-center justify-center hover:bg-[#93000a] transition-colors active:scale-95 flex-col gap-1">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">shield</span>
</button>
</div>
<!-- Persistent Bottom Information Sheet -->
<div class="absolute bottom-0 w-full bg-surface-container-lowest rounded-t-xl shadow-[0_-4px_24px_rgba(0,0,0,0.1)] z-30 pb-safe pt-2">

<div class="w-12 h-1.5 bg-surface-variant rounded-full mx-auto mb-4"></div>
<div class="px-margin-mobile pb-lg">

<div>

</div>
</div>

<div class="w-3 h-3 rounded-full bg-primary ring-2 ring-surface-container-lowest"></div>
<div class="w-3 h-3 rounded-full bg-surface-variant ring-2 ring-surface-container-lowest"></div>
</div>
</div>
<div class="flex justify-between text-label-md font-label-md text-secondary mb-lg px-1 uppercase tracking-wider">
<span>Assigned</span>
<span class="text-primary">Arriving</span>
<span>Arrived</span>
</div>
<!-- Driver Card -->

<div class="flex items-center gap-md">

<div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 bg-surface-container-lowest px-2 py-0.5 rounded-full flex items-center gap-1 shadow border border-outline-variant">
<span class="material-symbols-outlined text-[12px] text-[#eab308]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-label-md font-label-md text-on-surface">4.9</span>
</div>
</div>
<div>
<h3 class="text-body-lg font-body-lg font-bold text-on-surface">Chidi</h3>
<div class="flex items-center gap-2 mt-1">
<span class="bg-surface-container-high text-on-surface-variant px-2 py-1 rounded text-body-sm font-body-sm">ABJ-123-XY</span>

</div>
</div>

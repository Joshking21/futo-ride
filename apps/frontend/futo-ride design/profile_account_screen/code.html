<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">payments</span>

<span class="text-body-lg font-body-lg text-on-surface">Payment Methods</span>
</div>
<span class="material-symbols-outlined text-secondary">chevron_right</span>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .map-overlay-gradient {
            background: linear-gradient(180deg, rgba(248, 249, 255, 0.9) 0%, rgba(248, 249, 255, 0) 30%, rgba(248, 249, 255, 0) 70%, rgba(248, 249, 255, 0.9) 100%);
        }
        
        /* Toggle Switch Animation */
        .toggle-switch {
            transition: all 0.3s ease;
        }
        .toggle-knob {
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .is-online .toggle-knob {
            transform: translateX(100%);

<body class="bg-background text-on-background h-screen overflow-hidden flex flex-col relative">

</div>
<div class="pointer-events-auto flex items-center bg-surface-container-lowest rounded-full p-1 pr-4 shadow-lg cursor-pointer toggle-switch is-online border border-outline-variant" onclick="toggleOnlineStatus(this)">
<div class="w-24 h-10 bg-primary-container rounded-full relative flex items-center p-1">
<div class="w-8 h-8 bg-surface-container-lowest rounded-full shadow-md toggle-knob absolute left-1 flex items-center justify-center">

</div>
</div>

</div>
<div class="pointer-events-auto">
<button class="w-12 h-12 bg-surface-container-lowest rounded-full shadow-lg flex items-center justify-center text-primary relative">

</header>
<!-- Main Map Area -->

<div class="w-12 h-12 bg-primary bg-opacity-20 rounded-full animate-ping absolute"></div>
<div class="w-10 h-10 bg-primary rounded-full shadow-lg flex items-center justify-center relative z-10 border-4 border-surface-container-lowest">
<span class="material-symbols-outlined text-on-primary" style="font-size: 20px;">directions_car</span>
</div>
<div class="w-4 h-4 bg-primary rotate-45 transform -translate-y-2 relative z-0"></div>

<script>
        function toggleOnlineStatus(element) {
            element.classList.toggle('is-online');
            const statusText = element.querySelector('.status-text');
            const toggleBg = element.querySelector('.bg-primary-container');
            const icon = element.querySelector('.material-symbols-outlined');
            
            if (element.classList.contains('is-online')) {
                statusText.textContent = 'Online';
                statusText.classList.replace('text-secondary', 'text-primary');
                toggleBg.classList.replace('bg-surface-container-high', 'bg-primary-container');
                icon.textContent = 'wifi';
                icon.classList.replace('text-secondary', 'text-primary');
            } else {
                statusText.textContent = 'Offline';
                statusText.classList.replace('text-primary', 'text-secondary');
                toggleBg.classList.replace('bg-primary-container', 'bg-surface-container-high');
                icon.textContent = 'wifi_off';
                icon.classList.replace('text-primary', 'text-secondary');
            }
        }
    </script>

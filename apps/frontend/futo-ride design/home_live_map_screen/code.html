            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;

        /* Map pulsing animation for user location */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .pulse-ring::before {
            content: '';
            position: absolute;
            left: -100%; top: -100%; right: -100%; bottom: -100%;
            border-radius: 50%;
            background-color: theme('colors.primary');
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            z-index: -1;
        }

<body class="bg-background text-on-background font-body-md antialiased overflow-hidden select-none">
<!-- TopAppBar (From JSON) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-12 bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline">

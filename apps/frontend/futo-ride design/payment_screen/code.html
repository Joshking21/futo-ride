<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (Transactional Mode - Hidden Nav/Wallet to focus on task) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-margin h-touch-target border-b border-outline-variant bg-surface">
<button aria-label="Go back" class="w-touch-target h-touch-target flex items-center justify-start text-primary hover:bg-surface-container-high transition-colors rounded-full -ml-2">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Checkout</h1>
<div class="w-touch-target"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-[80px] pb-[140px] px-container-margin max-w-md mx-auto w-full">
<!-- Summary Card -->
<section class="mb-stack-lg">
<h2 class="text-headline-sm font-headline-sm text-on-surface mb-stack-sm">Ride Summary</h2>
<div class="bg-surface-container-lowest border border-outline-variant rounded-2xl p-stack-md shadow-sm">
<div class="flex justify-between items-center mb-stack-sm">
<span class="text-body-md font-body-md text-secondary">Base Fare</span>
<span class="text-body-md font-body-md text-on-surface font-medium">₦300</span>
</div>
<div class="flex justify-between items-center mb-stack-sm">
<span class="text-body-md font-body-md text-secondary">Priority Fee</span>
<span class="text-body-md font-body-md text-on-surface font-medium">₦100</span>
</div>
<div class="border-t border-outline-variant my-stack-sm pt-stack-sm flex justify-between items-end">
<span class="text-body-lg font-body-lg text-on-surface font-semibold">Total</span>
<span class="text-headline-lg-mobile font-headline-lg-mobile text-primary">₦400</span>
</div>
</div>
</section>
<!-- Payment Methods -->
<section>
<h2 class="text-headline-sm font-headline-sm text-on-surface mb-stack-md">Payment Method</h2>
<div class="flex flex-col gap-stack-sm">
<!-- Option 1: Monnify (Selected State) -->
<label class="relative flex items-center p-stack-md bg-primary-container/10 border-2 border-primary rounded-2xl cursor-pointer hover:bg-primary-container/20 transition-colors">
<input checked="" class="sr-only" name="payment_method" type="radio" value="monnify"/>
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center mr-stack-md text-primary">
<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex-1">
<div class="text-body-lg font-body-lg text-on-surface font-semibold">Monnify</div>
<div class="text-body-sm font-body-sm text-secondary">Card or Bank Transfer</div>
</div>
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-sm">
<span class="material-symbols-outlined text-[16px] font-bold">check</span>
</div>
</label>
<!-- Option 2: Privy (Unselected State) -->
<label class="relative flex items-center p-stack-md bg-surface-container-lowest border border-outline-variant rounded-2xl cursor-pointer hover:bg-surface-container-low transition-colors">
<input class="sr-only" name="payment_method" type="radio" value="privy"/>
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center mr-stack-md text-secondary">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div class="flex-1">
<div class="text-body-lg font-body-lg text-on-surface font-semibold">Privy</div>
<div class="text-body-sm font-body-sm text-secondary">cNGN Wallet</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center">
</div>
</label>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<footer class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-container-margin py-stack-md z-40 pb-safe">
<div class="max-w-md mx-auto w-full">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl flex items-center justify-center text-action-lg font-action-lg shadow-md active:scale-[0.98] transition-transform">
                Pay Now
            </button>
<div class="flex items-center justify-center mt-stack-sm text-secondary text-label-md font-label-md gap-1">
<span class="material-symbols-outlined text-[14px]">shield_lock</span>
<span>Secure SSL Processing</span>
</div>
</div>
</footer>
<script>
        // Simple JS to toggle active state visual styling for radio buttons
        const paymentLabels = document.querySelectorAll('label[class*="relative"]');
        const paymentInputs = document.querySelectorAll('input[name="payment_method"]');

        function updateSelection() {
            paymentInputs.forEach((input, index) => {
                const label = paymentLabels[index];
                const indicator = label.querySelector('.w-6.h-6');
                const iconContainer = label.querySelector('.w-10.h-10');
                
                if (input.checked) {
                    label.className = "relative flex items-center p-stack-md bg-primary-container/10 border-2 border-primary rounded-2xl cursor-pointer transition-colors";
                    indicator.className = "w-6 h-6 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-sm";
                    indicator.innerHTML = '<span class="material-symbols-outlined text-[16px] font-bold">check</span>';
                    iconContainer.className = "w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center mr-stack-md text-primary";
                } else {
                    label.className = "relative flex items-center p-stack-md bg-surface-container-lowest border border-outline-variant rounded-2xl cursor-pointer hover:bg-surface-container-low transition-colors";
                    indicator.className = "w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center";
                    indicator.innerHTML = '';
                    iconContainer.className = "w-10 h-10 rounded-full bg-surface-container flex items-center justify-center mr-stack-md text-secondary";
                }
            });
        }

        paymentInputs.forEach(input => {
            input.addEventListener('change', updateSelection);
        });
    </script>
</body></html>

<div class="absolute inset-0 bg-cover bg-center" data-alt="A high-quality, professional photograph of a modern university campus scene at FUTO during a bright sunny afternoon. The scene features a sleek, green campus shuttle bus parked near a contemporary lecture hall. The lighting is bright and high-contrast, emphasizing a clean, modern aesthetic with sharp shadows. The color palette focuses on campus green, crisp white, and deep charcoal, conveying safety, efficiency, and academic energy." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDYWMT0GsFgbMqGJOSSG4CLd9sIYwLSHa36GdY3C6q5AIv6TddPzhCJEdHsJrElPYYSniYN-2SYPxyTlvTvC9e7GZh1xq2J_Uj630-xNzWT487ATiPUPtwIq_cBq880QBvF9zhB0s2RxzOmaZ4gga5qebYO6eFvOut49kj4zpKq9F4LIZeajA2q33is-sdCG4PX1LogV449ytVWEc_joGr71bILwKQJcNCOLy2XDsupbQl6b5rNTnF9eLSaQ_J0SZeTRemVRQeJvbv6')"></div>

<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">directions_bus</span>

                            Welcome Back
                        </h1>
<p class="text-body-md font-body-md text-secondary">
                            Enter your details to access your account.
                        </p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-stack-md" method="POST" novalidate="">
<!-- Email Field -->
<div>
<label class="block text-label-md font-label-md text-on-surface mb-stack-sm uppercase tracking-wider" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary text-[20px]">mail</span>
</div>

</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-stack-sm">
<label class="block text-label-md font-label-md text-on-surface uppercase tracking-wider" for="password">Password</label>
<a class="text-label-md font-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors placeholder:text-secondary-fixed-dim" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-secondary hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>

<button class="w-full flex justify-center items-center h-[56px] px-4 border border-transparent rounded-full shadow-sm text-action-lg font-action-lg text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                                Log In
                            </button>
</div>

</div>
<div class="relative flex justify-center">
<span class="px-2 bg-surface-container-lowest text-label-md font-label-md text-secondary uppercase tracking-wider">Or continue with</span>
</div>
</div>

<button class="w-full flex justify-center items-center gap-2 h-[56px] px-4 border border-outline-variant rounded-full shadow-sm text-action-lg font-action-lg text-on-surface bg-surface-container-lowest hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-colors" type="button">

<span class="material-symbols-outlined text-[24px]">account_circle</span>
                            Log in with Google
                        </button>
</div>

<p class="text-body-md font-body-md text-secondary">

</p>
</div>
</div>
</div>

</main>
<script>
        // Simple password toggle interaction
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('button[aria-label="Toggle password visibility"]');
            const passwordInput = document.getElementById('password');
            const iconSpan = toggleButton.querySelector('.material-symbols-outlined');

            if (toggleButton && passwordInput) {
                toggleButton.addEventListener('click', () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    iconSpan.textContent = type === 'password' ? 'visibility_off' : 'visibility';
                });
            }
        });
    </script>

<body class="h-full bg-background text-on-background font-body-md antialiased overflow-hidden flex flex-col md:flex-row">
<!-- Left side: Image/Brand area -->
<div class="hidden md:flex w-1/2 relative bg-surface-container-high h-full items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center w-full h-full opacity-60 mix-blend-multiply" data-alt="A dynamic, modern urban scene showing blurred motion of a sleek car driving through a clean, sunlit city street. The lighting is bright and high-key, emphasizing a modern light-mode aesthetic with deep blue primary color accents in the environment. The mood is fast, efficient, and reliable." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB3pNmULRGre7Bp1UQfd-qHO-VSDHzUoa4ZD4wCGCUIjxY_T3XWTeXJXXSe5i8GKlR1RFubRl78WpOUOmsMqX7MFaM7d0jvpItT_kLhT7e-WEwbulGhOvLvto-X9lkpAnjaQ5yQ24veci264ag4ixBinurLgrl2BLM2yq1WsYneZMIo0xrD3VvLMwfcWyEvqnEbqk3dvI1eOvAlytgShblYqTSwWTEIvPtgeJhMfRst1g54OtKMwr_UyeL_FyOVVrV06JKmTcc3O5Wz')"></div>
<div class="relative z-10 text-center px-gutter max-w-md">
<h1 class="font-headline-xl text-headline-xl text-primary mb-md">JayBobo Transit</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Your reliable connection across campus and beyond. Fast, secure, and always on time.</p>
</div>
<!-- Decorative subtle gradient overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-container/50 to-transparent"></div>
</div>
<!-- Right side: Login Form -->
<div class="w-full md:w-1/2 flex flex-col justify-center px-margin-mobile md:px-margin-desktop h-full bg-surface relative z-10 overflow-y-auto">
<div class="w-full max-w-md mx-auto py-xl">
<!-- Mobile Logo -->
<div class="md:hidden mb-xl text-center">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">JayBobo Transit</span>
</div>
<div class="mb-xl text-center md:text-left">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background mb-sm">Welcome Back</h2>
<p class="font-body-md text-body-md text-secondary">Please enter your details to sign in.</p>
</div>
<form class="space-y-md">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg text-on-surface font-body-md bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="email" name="email" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg text-on-surface font-body-md bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="password" name="password" placeholder="Enter your password" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center">
<button aria-label="Toggle password visibility" class="text-outline hover:text-on-surface-variant focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex items-center justify-between mt-sm mb-lg">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-secondary" for="remember-me">
                            Remember me
                        </label>
</div>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Login Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200 shadow-[0_4px_12px_rgba(0,28,170,0.2)]" type="submit">
                    Log In
                </button>
</form>
<div class="mt-xl">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center font-body-sm text-body-sm">
<span class="px-2 bg-surface text-secondary">Or continue with</span>
</div>
</div>
<div class="mt-lg">
<!-- Social Login Button -->
<button class="w-full inline-flex justify-center items-center py-3 px-4 border border-outline-variant rounded-full shadow-sm bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="button">
<!-- Simulated Google Icon using an SVG path for accuracy, as Material doesn't have a specific branded Google icon -->
<svg class="h-5 w-5 mr-2" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Log in with Google
                    </button>
</div>
</div>
<!-- Sign Up Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-secondary">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Create account</a>
</p>
</div>
</div>
</div>

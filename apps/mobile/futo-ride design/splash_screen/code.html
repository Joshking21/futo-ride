<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .loader {
            border: 3px solid rgba(29, 53, 209, 0.1); /* outline-variant or similar subtle color */
            border-top: 3px solid #1D35D1; /* primary-container */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-container-lowest h-screen w-full flex flex-col items-center justify-center relative overflow-hidden">
<!-- Main Content Canvas: Centered Logo and Brand Name -->
<main class="flex flex-col items-center justify-center flex-grow z-10">
<!-- App Logo (Stylized 'R' or abstract motion shape) -->
<div class="w-24 h-24 mb-md flex items-center justify-center bg-primary rounded-xl shadow-lg relative overflow-hidden">
<!-- Simple geometric abstract representation of motion/transit -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary to-primary-container opacity-90"></div>
<span class="material-symbols-outlined text-on-primary" style="font-size: 64px; font-variation-settings: 'FILL' 1;">
                directions_car
            </span>
</div>
<!-- App Name -->
<h1 class="text-primary font-headline-xl text-headline-xl text-center tracking-tight">
            Futo Ride
        </h1>
</main>
<!-- Bottom Section: Loading Indicator -->
<div class="absolute bottom-16 left-0 right-0 flex justify-center pb-xl z-10">
<div class="loader"></div>
</div>
<!-- Decorative subtle background elements (optional, to avoid completely plain white) -->
<div class="absolute inset-0 pointer-events-none opacity-5">
<div class="absolute top-0 right-0 w-96 h-96 bg-primary rounded-full mix-blend-multiply filter blur-3xl translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl -translate-x-1/2 translate-y-1/2"></div>

</button>
</div>

<div class="mt-sm bg-surface-container-low px-4 py-1 rounded-full border border-outline-variant inline-flex items-center gap-2">

<span class="text-label-sm font-label-sm text-primary">Verified Rider</span>
</div>
</section>

<!-- Payment Methods -->
<li class="border-b border-outline-variant last:border-b-0">
<button class="w-full flex items-center justify-between p-md hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-surface flex items-center justify-center text-primary group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined">payments</span>
</div>
<div class="text-left">
<h3 class="text-label-md font-label-md text-on-surface">Payment Methods</h3>
<p class="text-body-sm font-body-sm text-secondary">Manage cards &amp; wallets</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>

</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin-mobile md:hidden relative overflow-hidden">
<!-- Confetti Background Layer -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-50 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary-container/20 via-background to-background"></div>
<main class="w-full max-w-md bg-surface rounded-xl shadow-lg border border-surface-container-highest p-lg flex flex-col gap-lg z-10 relative">
<!-- Header / Success Icon -->
<header class="flex flex-col items-center text-center gap-sm pt-4">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center shadow-lg shadow-primary-container/30 mb-2 animate-bounce">
<span class="material-symbols-outlined text-on-primary-container" data-icon="check_circle" style="font-size: 40px;">check_circle</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Trip Complete!</h1>
<p class="font-body-md text-body-md text-secondary">Thanks for riding with Futo Ride.</p>
</header>
<!-- Receipt Card -->
<section class="bg-surface-container-low rounded-lg p-md border border-outline-variant/30 flex flex-col gap-sm">
<div class="flex justify-between items-center border-b border-outline-variant/30 pb-3">
<span class="font-body-md text-body-md text-on-surface-variant">Total Fare</span>
<span class="font-headline-md text-headline-md text-primary">₦400</span>
</div>
<div class="flex justify-between items-center py-2">
<div class="flex items-center gap-2 text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="payments">payments</span>
<span class="font-body-sm text-body-sm">Payment Method</span>
</div>
<span class="font-body-md text-body-md font-semibold text-on-surface">Wallet</span>
</div>
<div class="flex justify-between items-center py-2">
<div class="flex items-center gap-2 text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="route">route</span>
<span class="font-body-sm text-body-sm">Distance</span>
</div>
<span class="font-body-md text-body-md text-on-surface">2.4 km</span>
</div>
<div class="flex justify-between items-center py-2">
<div class="flex items-center gap-2 text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="schedule">schedule</span>
<span class="font-body-sm text-body-sm">Duration</span>
</div>

</div>

<div>
<p class="font-body-md text-body-md font-bold text-on-surface">Chikezie E.</p>

</div>

<!-- Star Rating Slider -->
<div class="star-rating flex flex-row-reverse justify-center gap-2 mb-2 w-full">
<!-- Flex row-reverse allows CSS sibling selector to color previous stars -->
<input class="peer hidden" id="star5" name="rating" type="radio" value="5"/>
<label class="cursor-pointer" for="star5">
<span class="material-symbols-outlined text-[32px] peer-checked:text-primary" data-icon="star">star</span>
</label>
<input class="peer hidden" id="star4" name="rating" type="radio" value="4"/>

<span class="material-symbols-outlined text-[32px] peer-checked:text-primary" data-icon="star">star</span>
</label>
<input class="peer hidden" id="star3" name="rating" type="radio" value="3"/>

<span class="material-symbols-outlined text-[32px] peer-checked:text-primary" data-icon="star">star</span>
</label>
<input class="peer hidden" id="star2" name="rating" type="radio" value="2"/>

<span class="material-symbols-outlined text-[32px] peer-checked:text-primary" data-icon="star">star</span>
</label>

<span class="material-symbols-outlined text-[32px] peer-checked:text-primary" data-icon="star">star</span>
</label>

<button class="w-full h-[48px] bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:bg-on-primary-container transition-colors">
<span>Done</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<script>
        // Simple client-side star rating interaction
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('.star-rating label span');
            const inputs = document.querySelectorAll('.star-rating input');

            inputs.forEach(input => {
                input.addEventListener('change', (e) => {
                    const value = parseInt(e.target.value);
                    stars.forEach((star, index) => {
                        // Because flex is row-reverse, the first element in DOM is star5
                        const starVal = 5 - index; 
                        if(starVal <= value) {
                            star.classList.add('text-primary');
                            star.classList.remove('text-surface-variant');
                        } else {
                            star.classList.remove('text-primary');
                            star.classList.add('text-surface-variant');
                        }
                    });
                });
            });
            
            // Set default rating to 5
            document.getElementById('star5').checked = true;
            document.getElementById('star5').dispatchEvent(new Event('change'));
        });
    </script>

<body class="bg-background text-on-background min-h-screen flex flex-col pb-[100px]">
<!-- Top App Bar - Transactional (No Nav Shell logic) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline">
<button aria-label="Close receipt" class="p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">close</span>
</button>
<h1 class="text-headline-sm font-headline-sm font-bold text-primary dark:text-primary-fixed">JayBobo Transit</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow pt-24 px-margin-mobile md:px-margin-desktop max-w-2xl mx-auto w-full">
<!-- Success Header -->
<section class="flex flex-col items-center text-center mb-xl">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-md shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined fill-icon text-[40px] text-on-primary-container">check_circle</span>
</div>
<h2 class="text-headline-md font-headline-md text-on-background mb-sm">Trip Complete</h2>
<p class="text-body-md font-body-md text-secondary">Hope you enjoyed your ride across campus.</p>
</section>
<!-- Receipt Card -->
<section class="bg-surface-container rounded-xl p-lg border border-outline-variant shadow-sm mb-xl">
<div class="flex justify-between items-end border-b border-outline-variant pb-md mb-md">
<div class="flex flex-col">
<span class="text-label-md font-label-md text-secondary mb-xs">Total Fare</span>
<span class="text-headline-xl font-headline-xl text-primary">₦500</span>
</div>
<div class="bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant">
<span class="text-label-sm font-label-sm text-on-surface">Card •••• 4242</span>
</div>
</div>
<div class="grid grid-cols-2 gap-md pt-xs">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[18px]">route</span>
</div>
<div>
<p class="text-label-sm font-label-sm text-secondary">Distance</p>
<p class="text-body-md font-body-md text-on-surface">3.2 km</p>
</div>
</div>
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[18px]">schedule</span>
</div>
<div>
<p class="text-label-sm font-label-sm text-secondary">Duration</p>
<p class="text-body-md font-body-md text-on-surface">12 mins</p>
</div>
</div>
</div>
</section>
<!-- Rating Section -->
<section class="bg-surface-container-lowest rounded-xl p-lg border border-outline-variant shadow-sm mb-xl">
<h3 class="text-headline-sm font-headline-sm text-on-background mb-lg text-center">How was your driver?</h3>
<div class="flex flex-col items-center mb-lg">
<img alt="Driver Profile" class="w-16 h-16 rounded-full object-cover border-2 border-primary-container mb-sm" data-alt="A professional headshot of a friendly Nigerian driver in his 30s, wearing a neat light blue uniform shirt. Bright, natural daylight, soft bokeh background suggesting a clean modern vehicle interior. Corporate and modern mobility aesthetic, reliable and approachable mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB1Y8oDWslyDf83gor7zF4EFJJlSFCZGTZ1DGy3gob3ga3_XxicOnudUwtclxk9nvHT3IDglyMk4v_WsTGIQ7C8hH0pD7C151AsSkOlO17gbjCqjxs6bKpgxKbdVeebQaHmNnyyGpIxKTfr_xcKqjUYt6i65xB1TbNEQkbDLZIhcw2266WTA-7pmrO5LbL4bc4lbwRK2TxNUKykWWkjNSXUh6nKvjmfds-ftAGDRiPtEy67P6SbM534djzp4kBB1FlzHfPkj5uYo4j4"/>
<h4 class="text-body-lg font-body-lg text-on-surface font-semibold">Emeka O.</h4>
<p class="text-label-sm font-label-sm text-secondary">Toyota Camry • XYZ 123</p>
</div>
<div class="flex justify-center gap-2 mb-lg" id="star-rating">
<button class="p-2 text-outline hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-[32px] group-hover:fill-icon">star</span>
</button>
<button class="p-2 text-outline hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-[32px] group-hover:fill-icon">star</span>
</button>
<button class="p-2 text-outline hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-[32px] group-hover:fill-icon">star</span>
</button>
<button class="p-2 text-outline hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-[32px] group-hover:fill-icon">star</span>
</button>
<button class="p-2 text-outline hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-[32px] group-hover:fill-icon">star</span>
</button>
</div>
<div class="mt-md">
<label class="sr-only" for="feedback">Leave a compliment or comment</label>
<textarea class="w-full rounded-lg border-outline-variant bg-surface-bright focus:border-primary focus:ring focus:ring-primary-container/30 text-body-md font-body-md p-md placeholder-secondary resize-none" id="feedback" placeholder="Leave a compliment or comment (optional)" rows="3"></textarea>
</div>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 w-full bg-surface-container-lowest p-margin-mobile border-t border-outline-variant z-40 max-w-2xl left-1/2 -translate-x-1/2">
<button class="w-full h-12 bg-primary text-on-primary rounded-lg text-label-md font-label-md hover:bg-primary-container transition-colors shadow-md flex items-center justify-center">
            Done
        </button>
</div>
<script>
        // Simple star rating interaction
        const stars = document.querySelectorAll('#star-rating button');
        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                stars.forEach((s, i) => {
                    const icon = s.querySelector('span');
                    if (i <= index) {
                        s.classList.remove('text-outline');
                        s.classList.add('text-primary');
                        icon.classList.add('fill-icon');
                    } else {
                        s.classList.add('text-outline');
                        s.classList.remove('text-primary');
                        icon.classList.remove('fill-icon');
                    }
                });
            });
        });
    </script>
</body></html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ride Complete</title>

                            "xs": "4px",

<style>
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.05); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Top App Bar (Modified for focused transactional screen) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 bg-surface">
<button aria-label="Go Back" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary text-headline-md font-headline-md">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Ride Complete</h1>
<div class="w-12 h-12"></div> <!-- Spacer -->
</header>
<main class="w-full max-w-md mt-16 flex flex-col items-center gap-xl">
<!-- Success Indicator -->
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Route Summary Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm">
<div class="flex items-center gap-sm mb-sm">
<span class="material-symbols-outlined text-secondary text-[20px]">trip_origin</span>
<span class="text-body-md font-body-md text-on-surface">Senate Bldg</span>
</div>
<div class="pl-[9px] border-l-2 border-dashed border-outline-variant ml-[9px] h-4 mb-sm"></div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="text-body-md font-body-md text-on-surface font-semibold">FUTO Gate</span>
</div>
<div class="mt-md pt-md border-t border-outline-variant flex justify-between items-center">
<span class="text-body-sm font-body-sm text-secondary">Total Fare</span>
<span class="text-headline-md font-headline-md text-primary font-bold">N500.00</span>
</div>
</div>
<!-- QR Code Section -->
<div class="bg-surface-container-lowest p-lg rounded-2xl shadow-[0_8px_24px_rgba(0,0,0,0.05)] border border-outline-variant flex flex-col items-center gap-md relative">
<div class="absolute inset-0 border-2 border-primary rounded-2xl pulse-animation opacity-20 pointer-events-none"></div>
<h2 class="text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">Scan to Pay</h2>
<!-- Simulated QR Code Image -->
<div class="w-48 h-48 bg-surface border border-outline-variant rounded-lg overflow-hidden relative p-xs">
<!-- Using a placeholder pattern to simulate QR code structure -->
<div class="w-full h-full bg-cover bg-center" data-alt="A clean, high-contrast, black and white QR code image filling the frame perfectly. Modern digital UI style, crisp edges, stark black and pure white. No background distractions. Professional technology aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAbgHQkTLD7L0lgiT1m_dQ8fHOK2HbBZmTfmBY1AwXxM-k9Ztx4Kie5r08XYWIwGnStT1jitEwKGE9ze3E3buflHOgXVVcS9mEgCIst3CgC-u4qhN8-2-4y3cneV2vyUTrDEPdeOxKsLN4iBZHBQcW1utfx-O3SXQHlBiOyRYRsrlFEJS9rTfmU7D31hfOrJ6BEtjIZEKqykAjDDe3cXFXpH5OXK5UPjBMs9UUzGVbWFkfEArnLHPn2JMTtngCv596jcg9tXfoFRy1z')"></div>
<div class="absolute inset-0 bg-primary opacity-5 mix-blend-overlay pointer-events-none"></div>
</div>
<!-- Animated Status -->
<div class="flex items-center gap-sm text-primary mt-sm bg-primary-container/20 px-4 py-2 rounded-full">
<span class="material-symbols-outlined animate-spin" style="font-variation-settings: 'FILL' 0;">progress_activity</span>
<span class="text-label-md font-label-md">Waiting for rider to scan...</span>
</div>
</div>
<!-- Manual Override Actions (Secondary) -->
<div class="w-full flex justify-center gap-sm mt-lg">
<button class="px-6 py-3 rounded-full border border-outline text-secondary text-label-md font-label-md hover:bg-surface-container-high transition-colors">
                Cancel Scan
            </button>
<button class="px-6 py-3 rounded-full bg-surface-container-highest text-primary text-label-md font-label-md hover:bg-surface-variant transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">payments</span>
                Cash Received
            </button>
</div>
</main>
</body></html>

<button class="p-2 text-primary hover:bg-surface-container-high transition-colors rounded-full flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">

<button class="p-2 text-primary hover:bg-surface-container-high transition-colors rounded-full flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<span class="material-symbols-outlined">account_balance_wallet</span>
</button>
</header>
<!-- Desktop Navigation (Hidden on mobile) -->
<nav class="hidden md:flex flex-col w-64 h-screen fixed left-0 top-0 bg-surface border-r border-outline-variant shadow-lg z-40 px-gutter py-xl">

<h1 class="text-headline-lg font-headline-lg font-bold text-primary truncate">JayBobo Transit</h1>
</div>
<div class="flex flex-col gap-sm flex-1">
<a class="flex items-center gap-md px-md py-sm rounded-lg text-secondary hover:bg-surface-container-high transition-colors" href="#">

</a>
<a class="flex items-center gap-md px-md py-sm rounded-lg text-secondary hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-md text-label-md">Rides</span>
</a>
<a class="flex items-center gap-md px-md py-sm rounded-lg text-secondary hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-md text-label-md">Alerts</span>
</a>
<!-- Active State: Since this is payment/checkout, it implies an ongoing ride or profile action, but "Account" is the closest structural fit for wallets/payments if viewed from global nav context, though typically a checkout page would suppress nav entirely. We include it here per prompt constraints implying a full page design but suppress global nav for transactional flow per instructions -->
</div>
<div class="mt-auto border-t border-outline-variant pt-md">

<div class="hidden md:flex items-center gap-md mb-xl">
<button class="p-2 text-primary bg-surface-container rounded-full hover:bg-surface-container-high transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<span class="material-symbols-outlined">arrow_back</span>

<span class="font-label-sm text-label-sm text-secondary bg-surface px-2 py-1 rounded-full border border-outline-variant">Monnify</span>
</div>
</label>
<!-- Method 2: Privy -->

<input class="w-5 h-5 text-primary border-outline focus:ring-primary focus:ring-offset-surface bg-surface" name="payment_method" type="radio"/>

<span class="font-label-sm text-label-sm text-secondary bg-surface-container px-2 py-1 rounded-full">Privy</span>

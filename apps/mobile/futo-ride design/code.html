<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(186, 26, 26, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); }
        }
        .sos-button {
            animation: pulse-button 1.5s infinite;
        }
        @keyframes pulse-button {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(186, 26, 26, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-inverse-surface min-h-screen flex flex-col font-body-md text-on-background m-0 p-0 overflow-hidden">
<!-- Emergency Overlay Container -->
<div class="fixed inset-0 z-50 flex flex-col items-center justify-between py-10 px-margin-mobile bg-inverse-surface bg-opacity-95 backdrop-blur-md">
<!-- Top Section -->
<div class="w-full flex justify-center mb-xl">
<div class="flex items-center gap-2 bg-on-background bg-opacity-50 text-error px-4 py-2 rounded-full border border-error border-opacity-30">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-error opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-error"></span>
</span>
<span class="font-label-sm text-label-sm tracking-widest text-on-error">GPS ACTIVE</span>
</div>
</div>
<!-- Center Action -->
<div class="flex flex-col items-center flex-1 justify-center w-full max-w-sm gap-xl">
<!-- Warning Text -->
<div class="text-center flex flex-col items-center gap-sm">
<span class="material-symbols-outlined text-error text-4xl mb-2" style="font-variation-settings: 'FILL' 1;">warning</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-error mb-2">Emergency Alert</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-xs">
                    This alerts campus security with your live location. Use only in genuine emergencies.
                </p>
</div>
<!-- SOS Button -->
<button class="sos-button w-48 h-48 rounded-full bg-error flex flex-col items-center justify-center shadow-2xl border-4 border-error-container border-opacity-20 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-error text-6xl mb-2" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="font-headline-md text-headline-md text-on-error tracking-wider">SEND SOS</span>
</button>
<!-- Location Card -->
<div class="w-full bg-surface-container-highest rounded-xl border border-outline-variant overflow-hidden shadow-lg mt-4">
<!-- Map Area Placeholder -->
<div class="relative h-32 w-full bg-surface-variant overflow-hidden flex items-center justify-center" data-alt="A dark mode satellite view map of a university campus. The map should highlight a specific coordinate with a glowing red marker. The overall tone is urgent, technical, and precise, utilizing deep navy blues, dark greys, and stark red accents for the location. It should look like a high-tech tracking interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAP-YY12q4fIeKFG_wzPcoIcBRPLtpUTLf-VuKfLWRRYbsp8wgOMHvXe9nosnoRXv9Z5e3FVYNUOtnSElahC0xoiqUZC3FOgCw111OvV5wFMdke19nnodcTXN0YOklZ86MX7j-IAZOOOBTolg8IQpX3j4BRIMpc9kaA3Aij7udi4mpFssXmbFfKJgR3xvhmZ2qSnlrKUJ9HlYHrgdZmn2PsNg1sB43Y3BsSUm9jnnl3lnf60y9amt2p6SDmFgyObabyrj-NOhdrKgEz')">
<!-- Red Pulse Marker -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-4 h-4 bg-error rounded-full pulse-ring relative z-10 border-2 border-white"></div>
</div>
</div>
<!-- Coordinates Area -->
<div class="p-md flex justify-between items-center bg-surface">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-outline mb-1">CURRENT COORDINATES</span>
<span class="font-body-md text-body-md text-on-surface font-mono">5°23'14"N 6°59'35"E</span>
</div>
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-low text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">signal_cellular_alt</span>
</div>
</div>
</div>
</div>
<!-- Bottom Section -->
<div class="w-full max-w-sm mt-xl">
<button class="w-full py-4 rounded-lg border border-outline-variant text-on-error font-label-md text-label-md bg-transparent hover:bg-surface-variant hover:bg-opacity-10 active:bg-opacity-20 transition-colors">
                Cancel
            </button>
</div>
</div>

<body class="bg-background text-on-background min-h-screen font-body-md overflow-hidden flex flex-col relative">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-[56px] shadow-sm">
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-high transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary dark:text-primary-fixed">JayBobo Transit</h1>
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-high transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</button>
</header>
<!-- Main Content Canvas (Map & Overlays) -->
<main class="flex-1 mt-[56px] relative w-full h-full flex flex-col">
<!-- Map Canvas Placeholder -->
<div class="absolute inset-0 z-0 bg-surface-container-lowest" data-alt="A highly detailed top-down map view of a university campus in light mode. The map features clear, minimalist modern roads rendered in subtle light grays and blues. A vibrant blue route line highlights a path. The overall aesthetic is clean, professional, and reliable, utilizing solid color blocks and generous white space. The lighting suggests daytime clarity." data-location="FUTO Campus" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDCNnCteC6m0j1yR5Qqy0Enqe7qwelpngwYcgtGbr2JqO1I7NEz3sA--Xy_IMwuPeUddTpHiNhhLmYvhbK5Ky8c4RJxvX_oFeuhnWwb6oeKc8GL4y2Rg45FTJ7TV3A_dkkX9hmwXrN7wBdC3Xg8hIWxluuGF_2exeNc3S7_e316U5jSVt_4ZxwLqUd7mmQpMXZIaHegJDoAoPylQlOkKoL1l1DBHkNHd2cc8SsqtlaOOZj-5MaYQLW-6ckH34gd4suHD4q7K0Hbelg1')">
<!-- Simulated Map Elements -->
<div class="absolute top-[30%] left-[45%] w-12 h-12 bg-primary/20 rounded-full animate-pulse flex items-center justify-center">
<div class="w-6 h-6 bg-primary rounded-full border-2 border-white flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-[14px]" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
<div class="absolute top-[60%] left-[60%] w-8 h-8 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-[32px]">location_on</span>
</div>
<!-- Route Line SVG (Simulated) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="animate-[dash_20s_linear_infinite]" d="M 45 30 Q 60 45 60 60" fill="none" stroke="#1d35d1" stroke-dasharray="2 1" stroke-width="0.5"></path>
</svg>
<style>
                @keyframes dash {
                    to { stroke-dashoffset: -100; }
                }
            </style>
</div>
<!-- Floating SOS Button -->
<button class="absolute top-lg right-margin-mobile z-40 bg-error text-on-error shadow-lg rounded-full px-4 py-3 flex items-center gap-2 hover:bg-error/90 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-label-md text-label-md">SOS</span>
</button>
<!-- Bottom Sheet Wrapper (Live Tracker & Driver Info) -->
<div class="absolute bottom-0 w-full z-30 bg-surface rounded-t-[24px] shadow-[0_-8px_24px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden transition-transform duration-300 transform translate-y-0 pb-lg">
<!-- Drag Handle -->
<div class="w-full flex justify-center py-3">
<div class="w-12 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<!-- Content Area -->
<div class="px-margin-mobile flex flex-col gap-md">
<!-- Header: ETA & Status -->
<div class="flex flex-col items-center text-center pb-sm">
<h2 class="text-headline-md font-headline-md text-primary font-bold">Arriving in 3 mins</h2>
<p class="text-body-sm font-body-sm text-secondary mt-1">Your Keke is on the way to Senate Building</p>
</div>
<!-- Status Progress Bar -->
<div class="w-full bg-surface-container-low h-2 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full transition-all duration-1000 w-[60%]"></div>
</div>
<div class="flex justify-between text-label-sm font-label-sm text-secondary px-1">
<span class="text-primary font-semibold">Assigned</span>
<span class="text-primary font-semibold">Arriving</span>
<span>Arrived</span>
</div>
<!-- Driver Card (Glassmorphism/Modern) -->
<div class="bg-surface-container rounded-xl p-md flex items-center justify-between border border-outline-variant shadow-sm mt-sm">
<div class="flex items-center gap-md">
<div class="relative">
<img class="w-14 h-14 rounded-full object-cover border-2 border-surface" data-alt="A professional headshot of a reliable transit driver in a clean, modern setting. Light mode aesthetic with a subtle blue background tone to match the corporate mobility brand. The image should convey trust and dependability, utilizing clear, bright lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCT3Ylmq39uKnhtFqBWCgOQMs0SKcOBVP6P7yzE6S1eZMWguIO9zorm9SE6LzJv8dQyExjzYNgHwONpcoqTv-LerbbWZIDKzD96Ugi5-9xkzYlnimg_NG35cE382zQnhtyLNCrHNCrAqfaVIF8w_ZfDTd_R8eOACMdnU74-Q9lIIHVTYY93zQ0vQvXOHdS7fmjs9udXkSm5vpqjF7SG624HSgbB8F6W83qJqxbcorZvF9GYUZoDLrWUb-vCewOIWqOXsr8tb6m04vdQ"/>
<div class="absolute -bottom-1 -right-1 bg-surface rounded-full p-0.5">
<div class="bg-[#10b981] w-3 h-3 rounded-full"></div>
</div>
</div>
<div class="flex flex-col">
<span class="text-label-md font-label-md text-on-surface">Chukwuemeka O.</span>
<span class="text-body-sm font-body-sm text-secondary">Keke Napep • FTO-492-XA</span>
<div class="flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[#f59e0b] text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-label-sm font-label-sm text-on-surface">4.9</span>
</div>
</div>
</div>
<button class="bg-primary-container text-on-primary-container w-12 h-12 rounded-full flex items-center justify-center shadow-md hover:bg-primary transition-colors hover:text-on-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
</div>
<!-- Action Links -->
<div class="flex justify-center mt-md">
<button class="text-label-md font-label-md text-error hover:underline opacity-90 transition-opacity">Cancel Ride</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Suppressed - Linear/Transactional Intent (Active Ride Tracking) -->

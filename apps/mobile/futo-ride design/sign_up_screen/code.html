</div>

<label class="block text-label-md font-label-md text-on-surface mb-xs" for="email">FUTO Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">

</div>
</div>

<script>
        // Simple script to handle input focus states for icons
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                const icon = this.parentElement.querySelector('.material-symbols-outlined');
                if(icon) {
                    icon.classList.remove('text-outline');
                    icon.classList.add('text-primary');
                    icon.classList.add('filled');
                }
            });
            input.addEventListener('blur', function() {
                const icon = this.parentElement.querySelector('.material-symbols-outlined');
                if(icon) {
                    icon.classList.add('text-outline');
                    icon.classList.remove('text-primary');
                    icon.classList.remove('filled');
                }
            });
        });
    </script>

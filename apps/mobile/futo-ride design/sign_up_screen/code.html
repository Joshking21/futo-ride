            background-color: #ffffff; /* Level 0 base */

    body {
      min-height: max(884px, 100dvh);

<body class="min-h-screen flex flex-col font-body-md text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Modified for Transactional flow - no nav drawer or generic back if not needed, but keeping branding) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-margin h-touch-target bg-surface border-b border-outline-variant flat no shadows">
<div class="flex items-center gap-2">
<button aria-label="Go back" class="h-touch-target w-touch-target flex items-center justify-center text-primary hover:bg-surface-container-high transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back" data-weight="regular">arrow_back</span>
</button>
<span class="text-headline-md font-headline-md font-bold text-primary">Futo Ride</span>
</div>
</header>
<!-- Main Content Canvas (Transactional Flow - Shell navigation suppressed) -->
<main class="flex-grow flex items-center justify-center px-container-margin pt-[calc(var(--touch-target)+32px)] pb-stack-lg">
<div class="w-full max-w-md bg-surface-container-lowest border border-[#E5E5E5] rounded-xl p-6 sm:p-8 relative overflow-hidden">
<!-- Subtle Decorative Element -->
<div class="absolute top-0 right-0 -mt-10 -mr-10 w-32 h-32 bg-primary-container rounded-full opacity-10 blur-2xl pointer-events-none"></div>
<div class="mb-stack-lg relative z-10">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile md:text-headline-lg md:font-headline-lg text-on-surface mb-stack-sm">Create Account</h1>
<p class="text-body-md font-body-md text-secondary">Join the FUTO transit network for faster, safer rides across campus.</p>
</div>
<form action="#" class="space-y-stack-md relative z-10" method="POST">
<!-- Input: Full Name -->
<div>
<label class="block text-body-sm font-body-sm text-on-surface-variant mb-1" for="fullName">Full Name</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</span>
<input class="w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-[#E5E5E5] rounded-DEFAULT text-body-md font-body-md text-on-surface placeholder:text-secondary-fixed-dim focus:outline-none focus:border-inverse-surface focus:ring-1 focus:ring-inverse-surface transition-colors min-h-touch-target" id="fullName" name="fullName" placeholder="e.g. John Doe" required="" type="text"/>
</div>
</div>
<!-- Input: Email -->
<div>
<label class="block text-body-sm font-body-sm text-on-surface-variant mb-1" for="email">FUTO Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-[#E5E5E5] rounded-DEFAULT text-body-md font-body-md text-on-surface placeholder:text-secondary-fixed-dim focus:outline-none focus:border-inverse-surface focus:ring-1 focus:ring-inverse-surface transition-colors min-h-touch-target" id="email" name="email" placeholder="student@futo.edu.ng" required="" type="email"/>
</div>
</div>
<!-- Input: Password -->
<div>
<label class="block text-body-sm font-body-sm text-on-surface-variant mb-1" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-[#E5E5E5] rounded-DEFAULT text-body-md font-body-md text-on-surface placeholder:text-secondary-fixed-dim focus:outline-none focus:border-inverse-surface focus:ring-1 focus:ring-inverse-surface transition-colors min-h-touch-target" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-secondary hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<p class="text-[12px] text-secondary mt-1">Must be at least 8 characters.</p>
</div>
<!-- Input: Confirm Password -->
<div>
<label class="block text-body-sm font-body-sm text-on-surface-variant mb-1" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="lock_reset">lock_reset</span>
</span>
<input class="w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-[#E5E5E5] rounded-DEFAULT text-body-md font-body-md text-on-surface placeholder:text-secondary-fixed-dim focus:outline-none focus:border-inverse-surface focus:ring-1 focus:ring-inverse-surface transition-colors min-h-touch-target" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-stack-sm space-y-stack-sm">
<!-- Primary Button: Sign Up -->
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary text-action-lg font-action-lg rounded-DEFAULT flex items-center justify-center transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary min-h-[56px]" type="submit">
                        Sign Up
                    </button>
<!-- Divider -->
<div class="flex items-center justify-center my-stack-md">
<div class="border-t border-surface-container-high flex-grow"></div>
<span class="px-3 text-body-sm font-body-sm text-secondary">or</span>
<div class="border-t border-surface-container-high flex-grow"></div>
</div>
<!-- Secondary Button: Sign up with Google -->
<button class="w-full bg-inverse-surface hover:bg-on-surface text-on-primary text-action-lg font-action-lg rounded-DEFAULT flex items-center justify-center gap-2 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-inverse-surface min-h-[56px]" type="button">
<svg class="w-5 h-5 bg-white rounded-full p-0.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign up with Google
                    </button>
</div>
</form>
<!-- Login Link -->
<div class="mt-stack-lg text-center relative z-10">
<p class="text-body-sm font-body-sm text-secondary">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-primary rounded-sm inline-block p-1 -m-1" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- BottomNavBar Suppressed: Transactional screen context -->
</body></html>
